<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ page.title }} | The Refract Foundation</title>
  <link rel="stylesheet" href="/scripts/splide/dist/css/splide.min.css" />
  <link rel="stylesheet" href="/scripts/bootstrap-dist/css/bootstrap.min.css" />
  <link
    rel="stylesheet"
    href="/assets/style.css?v={{ site.time | date: '%s' }}"
  />
  <link rel="icon" type="image/x-icon" href="/img/favicon.ico" />
  <!-- Airtable embed script for dynamic iframe resizing -->
  <script src="https://static.airtable.com/js/base/embed.js"></script>
  <script src="/scripts/splide/dist/js/splide.min.js"></script>
  <!-- Airtable embed script handles dynamic iframe resizing automatically -->
  <script>
    // Airtable's embed.js will auto-initialize iframes with class "airtable-embed"
  </script>
</head>
<script src="/scripts/splide-extension-auto-scroll.min.js"></script>
<script src="/scripts/bootstrap-dist/js/bootstrap.min.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", function () {
    var carousel = document.querySelector("#image-carousel.splide");

    if (!carousel) {
      return;
    }

    var splide = new Splide(carousel, {
      type: "loop",
      drag: "free",
      focus: "center",
      perPage: 3,
      gap: "1rem",
      autoScroll: {
        speed: 1,
      },
    });

    splide.mount(window.splide.Extensions);
  });
</script>
